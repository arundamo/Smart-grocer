<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grocer - Demo Scan Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-center text-indigo-600 mb-2">Demo Scan Sheet</h1>
        <p class="text-gray-500 text-center mb-8 text-sm">Scan these with your "Smart Grocer" app to show the owner how it works.</p>

        <div class="mb-8 border-b pb-4 text-center">
            <h2 class="text-lg font-semibold">Sona Masoori Rice (5kg)</h2>
            <p class="text-sm text-gray-500 mb-2">Aisle 1</p>
            <img class="mx-auto" src="https://bwipjs-api.metafloor.com/?bcid=code128&text=8901234567012&scale=2&rotate=N&includetext" alt="Rice Barcode">
            <p class="text-xs mt-1 text-gray-400">ID: 8901234567012</p>
        </div>

        <div class="mb-8 border-b pb-4 text-center">
            <h2 class="text-lg font-semibold">MDH Chana Masala</h2>
            <p class="text-sm text-gray-500 mb-2">Aisle 4</p>
            <img class="mx-auto" src="https://bwipjs-api.metafloor.com/?bcid=code128&text=8901234567013&scale=2&rotate=N&includetext" alt="Masala Barcode">
            <p class="text-xs mt-1 text-gray-400">ID: 8901234567013</p>
        </div>

        <div class="mb-8 border-b pb-4 text-center">
            <h2 class="text-lg font-semibold">Fresh Cilantro</h2>
            <p class="text-sm text-gray-500 mb-2">Produce 2</p>
            <img class="mx-auto" src="https://bwipjs-api.metafloor.com/?bcid=code128&text=8901234567014&scale=2&rotate=N&includetext" alt="Cilantro Barcode">
            <p class="text-xs mt-1 text-gray-400">ID: 8901234567014</p>
        </div>

        <div class="text-center">
            <h2 class="text-lg font-semibold">Mutton, 500g</h2>
            <p class="text-sm text-gray-500 mb-2">Butcher 1</p>
            <img class="mx-auto" src="https://bwipjs-api.metafloor.com/?bcid=code128&text=8901234567015&scale=2&rotate=N&includetext" alt="Mutton Barcode">
            <p class="text-xs mt-1 text-gray-400">ID: 8901234567015</p>
        </div>
    </div>
</body>
</html>
